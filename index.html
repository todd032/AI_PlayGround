<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI PlayGround - Game Launcher</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #1c2552, #0a0e22 60%);
        color: #eef2ff;
      }

      .container {
        width: min(960px, 92vw);
        margin: 0 auto;
        padding: 3rem 0 4rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 3vw, 2.5rem);
      }

      .subtitle {
        margin-top: 0.5rem;
        color: #c6cdec;
      }

      .grid {
        margin-top: 1.5rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1rem;
      }

      .card {
        display: block;
        border-radius: 14px;
        border: 1px solid #394279;
        background: rgba(8, 13, 35, 0.8);
        padding: 1rem;
        text-decoration: none;
        color: inherit;
        transition: transform 0.12s ease, border-color 0.12s ease;
      }

      .card:hover {
        transform: translateY(-3px);
        border-color: #6f8bff;
      }

      .tag {
        display: inline-block;
        font-size: 0.72rem;
        background: #22306b;
        color: #dbe4ff;
        padding: 0.2rem 0.5rem;
        border-radius: 999px;
        margin-bottom: 0.6rem;
      }

      .card h2 {
        margin: 0;
        font-size: 1.2rem;
      }

      .card p {
        margin: 0.5rem 0 0;
        color: #c6cdec;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>AI PlayGround</h1>
      <p class="subtitle">플레이할 게임을 선택하세요.</p>

      <section class="grid" aria-label="게임 목록">
        <a class="card" href="./games/meteor-dodge/">
          <span class="tag">Arcade</span>
          <h2>Meteor Dodge</h2>
          <p>좌우 이동으로 메테오를 피하며 생존 점수를 올리는 캔버스 기반 게임.</p>
        </a>

        <a class="card" href="./games/minesweeper/">
          <span class="tag">Puzzle</span>
          <h2>Mini Minesweeper</h2>
          <p>숫자 힌트로 지뢰를 추리하고 모든 안전 칸을 여는 클래식 퍼즐 게임.</p>
        </a>
      </section>
    </main>
  </body>
</html>
